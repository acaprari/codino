<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Codino">
  <!-- Editor window body -->
  <rect x="2" y="2" width="60" height="60" rx="8" fill="#1e293b"/>
  <!-- Title bar (with rounded top corners only) -->
  <path d="M 2 14 L 2 10 Q 2 2 10 2 L 54 2 Q 62 2 62 10 L 62 14 Z" fill="#0f172a"/>
  <!-- Traffic light dots -->
  <circle cx="8" cy="8" r="2" fill="#ef4444"/>
  <circle cx="14" cy="8" r="2" fill="#f59e0b"/>
  <circle cx="20" cy="8" r="2" fill="#10b981"/>
  <!-- Line numbers gutter -->
  <rect x="2" y="14" width="6" height="48" fill="#0f172a"/>
  <!-- The C, brand purple, bold monospace, centered in the code area -->
  <text x="35" y="51" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="38" font-weight="700" fill="#9333ea" text-anchor="middle">C</text>
</svg>
